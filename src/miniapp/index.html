<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Veriaapp</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d1117;
  --card: #161b22;
  --card2: #1c2333;
  --accent: #e94560;
  --accent2: #533483;
  --green: #3fb950;
  --yellow: #d29922;
  --text: #e6edf3;
  --text2: #8b949e;
  --border: rgba(255,255,255,0.08);
  --r: 14px;
}

body {
  font-family: 'Vazirmatn', Tahoma, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 24px;
}

/* HEADER */
.header {
  background: linear-gradient(160deg, #1c2333 0%, #0d1117 100%);
  padding: 28px 20px 22px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.avatar {
  width: 76px; height: 76px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px; margin: 0 auto 12px;
  border: 3px solid rgba(255,255,255,0.12);
}
.h-name { font-size: 19px; font-weight: 700; }
.h-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }
.badge {
  display: inline-block; margin-top: 9px;
  padding: 4px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
}
.b-user   { background: rgba(255,255,255,0.1); }
.b-vip    { background: linear-gradient(90deg,#11998e,#38ef7d); color:#000; }
.b-premium{ background: linear-gradient(90deg,#f7971e,#ffd200); color:#000; }
.b-admin  { background: linear-gradient(90deg,#4776E6,#8E54E9); }
.b-owner  { background: linear-gradient(90deg,#e94560,#c62a47); }

/* CONTENT */
.content { padding: 14px 16px; }

.sec-title {
  font-size: 11px; font-weight: 600;
  color: var(--text2); letter-spacing: 1px;
  text-transform: uppercase;
  margin: 18px 0 10px;
}

/* STATS */
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.stat {
  background: var(--card); border-radius: var(--r);
  padding: 15px; text-align: center;
  border: 1px solid var(--border);
}
.stat-icon { font-size: 22px; margin-bottom: 5px; }
.stat-val { font-size: 20px; font-weight: 700; }
.stat-lbl { font-size: 10px; color: var(--text2); margin-top: 2px; }

/* INVITE */
.invite-box {
  background: var(--card); border-radius: var(--r);
  padding: 16px; border: 1px solid var(--border);
}
.invite-row {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 12px;
}
.invite-row span { font-size: 13px; color: var(--text2); }
.invite-count { font-size: 22px; font-weight: 700; color: var(--accent); }
.link-text {
  background: rgba(255,255,255,0.04); border-radius: 9px;
  padding: 9px 12px; font-size: 11px;
  color: var(--text2); word-break: break-all;
  direction: ltr; text-align: left; margin-bottom: 10px;
}
.copy-btn {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  color: #fff; border: none; border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: opacity .2s;
}
.copy-btn:active { opacity: .75; }
.copy-btn.ok { background: linear-gradient(135deg,#11998e,#38ef7d); color:#000; }

/* PREMIUM BANNER */
.prem-banner {
  background: rgba(247,151,30,.08);
  border: 1px solid rgba(247,151,30,.25);
  border-radius: var(--r);
  padding: 14px; display: flex; align-items: center; gap: 12px;
  margin-top: 10px;
}
.prem-banner .ico { font-size: 28px; }
.prem-banner .t { flex: 1; }
.prem-banner .t1 { font-size: 13px; font-weight: 600; color: #ffd200; }
.prem-banner .t2 { font-size: 11px; color: var(--text2); margin-top: 2px; }
.prem-btn {
  background: linear-gradient(90deg,#f7971e,#ffd200);
  color: #000; border: none; border-radius: 8px;
  padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer;
}

/* FEATURES */
.features { display: grid; grid-template-columns: repeat(4,1fr); gap: 9px; }
.feat {
  background: var(--card); border-radius: var(--r);
  padding: 13px 6px; text-align: center;
  border: 1px solid var(--border); cursor: pointer;
  transition: transform .15s, background .15s;
}
.feat:active { transform: scale(.93); background: var(--card2); }
.feat-ico { font-size: 24px; margin-bottom: 5px; }
.feat-lbl { font-size: 10px; color: var(--text2); }

/* LOADER */
.loader { text-align: center; padding: 60px 20px; color: var(--text2); }
.spin {
  width: 30px; height: 30px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: rot .8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes rot { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="root">
  <div class="loader"><div class="spin"></div>در حال بارگذاری...</div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const tgUser = tg?.initDataUnsafe?.user || {};
const initData = tg?.initData || '';
const BASE = location.origin;

const ROLES = { user:'کاربر', vip:'VIP', premium:'پریمیوم ⭐', admin:'ادمین', owner:'مالک 👑' };

async function load() {
  const [meR, stR] = await Promise.all([
    fetch(`${BASE}/api/me?initData=${encodeURIComponent(initData)}`).catch(()=>null),
    fetch(`${BASE}/api/stats`).catch(()=>null),
  ]);
  const me    = meR?.ok    ? await meR.json()  : {};
  const stats = stR?.ok    ? await stR.json()  : {};
  render(me, stats);
}

function render(me, st) {
  const name   = me.firstName || tgUser.first_name || 'کاربر';
  const uname  = me.username  || tgUser.username   || '';
  const role   = me.role      || 'user';
  const refs   = me.referralCount ?? 0;
  const link   = me.inviteLink   || '';
  const active = role === 'premium' && me.premiumExpiry && new Date(me.premiumExpiry) > new Date();

  document.getElementById('root').innerHTML = `
<div class="header">
  <div class="avatar">👤</div>
  <div class="h-name">${x(name)}</div>
  ${uname ? `<div class="h-sub">@${x(uname)}</div>` : ''}
  <div class="badge b-${role}">${ROLES[role]||role}</div>
</div>

<div class="content">
  <div class="sec-title">📊 آمار کلی</div>
  <div class="stats">
    <div class="stat"><div class="stat-icon">👤</div><div class="stat-val">${st.totalUsers??'—'}</div><div class="stat-lbl">کل کاربران</div></div>
    <div class="stat"><div class="stat-icon">🆕</div><div class="stat-val">${st.newToday??'—'}</div><div class="stat-lbl">کاربر امروز</div></div>
    <div class="stat"><div class="stat-icon">📅</div><div class="stat-val">${st.newThisWeek??'—'}</div><div class="stat-lbl">این هفته</div></div>
    <div class="stat"><div class="stat-icon">⭐</div><div class="stat-val">${st.premiumUsers??'—'}</div><div class="stat-lbl">پریمیوم فعال</div></div>
  </div>

  ${!active ? `
  <div class="prem-banner">
    <div class="ico">⭐</div>
    <div class="t"><div class="t1">Veriaapp Premium</div><div class="t2">دسترسی نامحدود — ۱۰۰ ستاره ماهانه</div></div>
    <button class="prem-btn" onclick="tg?.close()">خرید</button>
  </div>` : ''}

  <div class="sec-title">🔗 دعوت دوستان</div>
  <div class="invite-box">
    <div class="invite-row">
      <span>دوستان دعوت‌شده</span>
      <div class="invite-count">${refs} نفر</div>
    </div>
    ${link ? `
    <div class="link-text" id="lnk">${x(link)}</div>
    <button class="copy-btn" id="cbtn" onclick="cp(${JSON.stringify(link)})">📋 کپی لینک دعوت</button>
    ` : '<div style="font-size:13px;color:var(--text2)">لاگین کن تا لینک دعوتت رو ببینی</div>'}
  </div>

  <div class="sec-title">🚀 دسترسی سریع</div>
  <div class="features">
    <div class="feat" onclick="close_()"><div class="feat-ico">📺</div><div class="feat-lbl">یوتیوب</div></div>
    <div class="feat" onclick="close_()"><div class="feat-ico">🤖</div><div class="feat-lbl">هوش مصنوعی</div></div>
    <div class="feat" onclick="close_()"><div class="feat-ico">📰</div><div class="feat-lbl">اخبار</div></div>
    <div class="feat" onclick="close_()"><div class="feat-ico">🐦</div><div class="feat-lbl">توییتر</div></div>
    <div class="feat" onclick="close_()"><div class="feat-ico">💬</div><div class="feat-lbl">نقل‌قول</div></div>
    <div class="feat" onclick="close_()"><div class="feat-ico">⭐</div><div class="feat-lbl">پریمیوم</div></div>
    <div class="feat" onclick="close_()"><div class="feat-ico">🔗</div><div class="feat-lbl">دعوت</div></div>
    <div class="feat" onclick="close_()"><div class="feat-ico">ℹ️</div><div class="feat-lbl">درباره ما</div></div>
  </div>
</div>`;
}

function cp(link) {
  navigator.clipboard?.writeText(link).then(() => {
    const b = document.getElementById('cbtn');
    b.textContent = '✅ کپی شد!';
    b.classList.add('ok');
    setTimeout(() => { b.textContent = '📋 کپی لینک دعوت'; b.classList.remove('ok'); }, 2000);
    tg?.HapticFeedback?.notificationOccurred('success');
  }).catch(() => tg?.showAlert('لینک: ' + link));
}

function close_() { tg?.close(); }

function x(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load().catch(() => render({}, {}));
</script>
</body>
</html>
